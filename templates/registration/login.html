<!-- templates/registration/signup.html -->
{% extends "main.html" %}

{% block title %}Log In{% endblock %}

{% block base %}
  <div class="form-page">
    <div class="form-style">
      <h2>Log In</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Log in">
      </form>
      <p>New user? <a href="{% url 'signup' %}">Sign Up</a></p>
    </div>
  </div>
{% endblock %}
