<!-- templates/registration/signup.html -->
{% extends "main.html" %}

{% block title %}Sign Up{% endblock %}

{% block base %}
  <div class="form-page">
    <div class="form-style">
      <h2>Sign Up</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Sign Up">
      </form>
      <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
    </div>
  </div>
{% endblock %}
